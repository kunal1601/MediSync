# ===================================================================
#  MySQL Database Engine Connection Configurations
# ===================================================================
spring.datasource.url=jdbc:mysql://localhost:3306/medisync_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=YOUR_MYSQL_PASSWORD_HERE
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================================================
#  JPA / Hibernate Persistence Layer Configurations
# ===================================================================
# DDL auto strategy: 'update' automatically updates your schema structures without wiping data
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect